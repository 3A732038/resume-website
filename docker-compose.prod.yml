# 固定 project 名為 resume-prod，與開發端 resume-dev 隔離，
# 避免兩邊共用預設 project 名導致 image / 容器互相覆蓋。
name: resume-prod

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    volumes:
      - ./assets:/app/assets:ro
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      # 本地 prod 對外用 777，避免跟 dev 的 80 衝突，兩邊可同時跑
      - "777:80"
    depends_on:
      - backend
    restart: unless-stopped
