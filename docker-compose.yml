# 固定 project 名為 resume-dev，與生產端 resume-prod 隔離，
# 避免兩邊共用預設 project 名導致 image / 容器互相覆蓋。
name: resume-dev

services:
  backend:
    build: ./backend
    container_name: backend
    volumes:
      - ./backend:/app
      - ./assets:/app/assets:ro
    env_file:
      - ./backend/.env
    networks:
      default: {}
      # 接到共用反向代理網路，並給一個全域唯一別名，供共用 nginx 代理。
      # aliases 是跨 compose 的 DNS 名稱：container_name 只在同一個 compose 內有效，
      # 外部的 nginx-proxy compose 無法用 container_name 找到這個容器，
      # 必須透過 aliases 在 web 網路裡註冊名稱才能被解析。
      web:
        aliases:
          - resume-dev-backend
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: frontend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      # 把 package.json 掛出來：在容器內 npm install 後，主機這份會即時同步，
      # 方便查看裝了哪些套件，也讓 git / Render build 拿到最新依賴清單。
      - ./frontend/package.json:/app/package.json
    depends_on:
      - backend
    networks:
      default: {}
      # 同上，給 nginx-proxy 跨 compose 解析前端容器用
      web:
        aliases:
          - resume-dev-frontend
    # 保留 3000 對外，方便需要時直連 Vite 除錯；日常走 http://resume-dev.localhost
    ports:
      - "3000:3000"
    restart: unless-stopped

# 不再需要專案內的 nginx —— 改由 ../reverse-proxy 的共用 nginx 統一代理

networks:
  default: {}
  # 共用反向代理網路（由 reverse-proxy 那邊先建立：docker network create web）
  web:
    external: true
